{% extends 'main/base.html' %}

{% block title %}Blogger — New Post{% endblock %}

{% block content %}

  <div class="form-page">

    <!--Form card -->
    <div class="form-card">

      <div class="form-card__header">
        <h2>New Post</h2>
        <p>Share your thoughts with the world.</p>
      </div>

      <form method="POST">
        {% csrf_token %}

        <div class="form-group">
          <label for="id_title">Title</label>
          <input
            type="text"
            id="id_title"
            name="title"
            placeholder="Give your post a great title…"
            autocomplete="off"
            required
          />
        </div>

        <div class="form-group">
          <label for="id_content">Content</label>
          <textarea
            id="id_content"
            name="content"
            placeholder="What's on your mind? Start writing…"
            required
          ></textarea>
        </div>

        <div class="form-submit">
          <button type="submit" class="btn-primary">Publish Post ✦</button>
          <a href="{% url 'main:home' %}" class="btn-secondary">Cancel</a>
        </div>
      </form>

    </div>
  </div>

{% endblock %}
